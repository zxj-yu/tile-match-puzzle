name: GUT Tests

# 每次 push 和 PR 都在云端跑单元测试
on:
  push:
  pull_request:

jobs:
  test:
    name: Run GUT unit tests
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.7-stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot (headless)
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          sudo mv "Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      # 首次运行先导入资源（贴图、场景等），否则 preload 会失败
      - name: Import project resources
        run: godot --headless --import
        continue-on-error: true

      - name: Run GUT tests
        run: godot --headless -s res://addons/gut/gut_cmdln.gd -gdir=res://tests -ginclude_subdirs -gexit
